---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adaptive-export
spec:
  replicas: 0
  selector:
    matchLabels:
      name: adaptive-export
  template:
    metadata:
      labels:
        name: adaptive-export
        plane: control
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/os
                operator: Exists
              - key: kubernetes.io/os
                operator: In
                values:
                - linux
            - matchExpressions:
              - key: beta.kubernetes.io/os
                operator: Exists
              - key: beta.kubernetes.io/os
                operator: In
                values:
                - linux
      serviceAccountName: pl-adaptive-export-service-account
      containers:
      - name: adaptive-export
        image: vizier-adaptive_export_image:latest
        env:
        - name: PL_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: PIXIE_API_KEY
          valueFrom:
            secretKeyRef:
              name: pl-adaptive-export-secrets
              key: pixie-api-key
        - name: CLICKHOUSE_DSN
          valueFrom:
            secretKeyRef:
              name: pl-adaptive-export-secrets
              key: clickhouse-dsn
        - name: VERBOSE
          value: "true"
        - name: DETECTION_INTERVAL_SEC
          value: "10"
        - name: DETECTION_LOOKBACK_SEC
          value: "30"
        # EXPORT_MODE controls the reconcile behaviour:
        #   auto    - detection drives on/off (default)
        #   always  - plugin always enabled (bypass detection)
        #   never   - plugin always disabled and ch-* scripts purged
        - name: EXPORT_MODE
          value: "auto"
        # Number of consecutive empty detection ticks before auto-disable fires.
        - name: EXPORT_QUIET_TICKS
          value: "6"
        # Optional overrides for the ClickHouse PxL scripts. When unset they are
        # parsed from CLICKHOUSE_DSN. Individual fields win over the parsed DSN.
        # Defaults below match soc/tree/clickhouse-lab (forensic-soc-db CHI,
        # ingest_writer user, forensic_db database).
        - name: KUBESCAPE_TABLE
          value: "kubescape_logs"
        # - name: CLICKHOUSE_HOST
        #   value: "clickhouse-forensic-soc-db.clickhouse.svc.cluster.local"
        # - name: CLICKHOUSE_PORT
        #   value: "9000"
        # - name: CLICKHOUSE_USER
        #   value: "ingest_writer"
        # - name: CLICKHOUSE_PASSWORD
        #   value: "changeme-ingest"
        # - name: CLICKHOUSE_DATABASE
        #   value: "forensic_db"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
      securityContext:
        runAsUser: 10100
        runAsGroup: 10100
        fsGroup: 10100
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
